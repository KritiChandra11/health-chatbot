<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assistant Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5e6ff 0%, #e6f4ff 50%, #d4e6ff 100%);
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #a78bfa 0%, #93c5fd 100%);
            color: white;
            padding: 32px 40px;
            text-align: left;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
        }

        /* Chat Summary */
        .chat-summary {
            padding: 16px 40px;
            background: rgba(248, 250, 252, 0.8);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            font-size: 14px;
            color: #64748b;
            min-height: 50px;
            flex-shrink: 0;
            overflow-y: auto;
            max-height: 80px;
            display: flex;
            align-items: center;
        }

        /* Content Wrapper - scrollable area */
        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding-bottom: 12px;
        }

        .content-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .content-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        .content-wrapper::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.3);
            border-radius: 3px;
        }

        /* Result Panel */
        .result-panel {
            padding: 32px 40px 0 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-panel.empty {
            justify-content: center;
            align-items: flex-start;
            padding: 60px 40px 40px 40px;
            min-height: 200px;
            color: #94a3b8;
            font-size: 15px;
        }

        /* Cards */
        .hero-card {
            background: linear-gradient(135deg, #a78bfa 0%, #93c5fd 100%);
            color: white;
            padding: 24px;
            border-radius: 20px;
            animation: fadeInUp 0.4s ease-out;
        }

        .info-card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 16px;
            border-left: 4px solid #6366f1;
            animation: slideInCard 0.5s ease-out;
        }

        .info-card.warning {
            border-left-color: #fb7185;
        }

        .info-card.doctor {
            border-left-color: #fbbf24;
        }

        .card-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-description {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .info-card .card-title {
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .info-card .card-description {
            font-size: 13px;
            color: #475569;
        }

        /* Loading Animation */
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 0%, #f1f5f9 50%, #e2e8f0 100%);
            background-size: 200% 100%;
            animation: pulse 2s infinite;
            height: 120px;
            border-radius: 16px;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        /* Quick Action Buttons Container */
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 24px 40px;
            background: rgba(248, 250, 252, 0.4);
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            border-bottom: 1px solid rgba(226, 232, 240, 0.4);
            flex-shrink: 0;
            max-height: 80px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Hide buttons when result is displayed */
        .quick-buttons.hidden {
            display: none;
            max-height: 0;
            padding: 0;
            border: none;
        }

        .quick-btn {
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
            border: 1.5px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            transform: translateY(-2px);
        }

        .quick-btn:active {
            transform: translateY(0);
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px 40px;
            background: rgba(248, 250, 252, 0.8);
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            border: 1.5px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .message-input:focus {
            outline: none;
            border-color: #a78bfa;
            background: white;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #a78bfa 0%, #93c5fd 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInCard {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                background-position: 200% 0;
            }
            50% {
                background-position: 0 0;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Staggered animations */
        .info-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .info-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .info-card:nth-child(4) {
            animation-delay: 0.3s;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 24px 24px;
            }

            .header h1 {
                font-size: 26px;
            }

            .chat-summary {
                padding: 12px 24px;
            }

            .result-panel {
                padding: 24px 24px 0 24px;
            }

            .result-panel.empty {
                padding: 40px 24px 24px;
            }

            .quick-buttons {
                grid-template-columns: repeat(2, 1fr);
                padding: 16px 24px;
                gap: 10px;
            }

            .input-area {
                padding: 16px 24px;
                gap: 10px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .message-input {
                font-size: 14px;
                padding: 10px 12px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header p {
                font-size: 12px;
            }

            .chat-summary {
                padding: 12px 16px;
                font-size: 12px;
            }

            .result-panel {
                padding: 16px 16px 0 16px;
                gap: 14px;
            }

            .result-panel.empty {
                padding: 32px 16px 16px;
            }

            .quick-buttons {
                grid-template-columns: 1fr 1fr;
                padding: 12px 16px;
                gap: 8px;
            }

            .quick-btn {
                font-size: 12px;
                padding: 10px 12px;
            }

            .input-area {
                padding: 12px 16px;
                gap: 8px;
            }

            .message-input {
                font-size: 13px;
                padding: 9px 11px;
            }

            .send-btn {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }

            .hero-card {
                padding: 20px;
            }

            .card-title {
                font-size: 20px;
            }

            .info-card {
                padding: 14px;
            }

            .info-card .card-title {
                font-size: 14px;
            }

            .info-card .card-description {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💚 Health Assistant</h1>
            <p>Your personal wellness companion</p>
        </div>

        <!-- Chat Summary -->
        <div class="chat-summary" id="chatSummary">
            Ask any health-related question...
        </div>

        <!-- Content Wrapper (scrollable) -->
        <div class="content-wrapper">
            <!-- Result Panel -->
            <div class="result-panel empty" id="resultPanel">
                <div>Select a quick question or type your own to get started</div>
            </div>
        </div>

        <!-- Quick Action Buttons -->
        <div class="quick-buttons" id="quickButtons">
            <button class="quick-btn" onclick="quickSearch('common cold')">🤒 Cold</button>
            <button class="quick-btn" onclick="quickSearch('headache')">🤕 Headache</button>
            <button class="quick-btn" onclick="quickSearch('anxiety')">😰 Anxiety</button>
            <button class="quick-btn" onclick="quickSearch('digestion')">🤢 Digestion</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                class="message-input" 
                id="messageInput" 
                placeholder="Describe your concern..." 
                onkeypress="event.key === 'Enter' && sendMessage()"
            >
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002/api/health/chat';
        const resultPanel = document.getElementById('resultPanel');
        const messageInput = document.getElementById('messageInput');
        const chatSummary = document.getElementById('chatSummary');
        const quickButtons = document.getElementById('quickButtons');

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            updateChatSummary(message, 'user');
            messageInput.value = '';
            showLoading();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayHealthResult(data);
                updateChatSummary(data.topic || 'Response received', 'assistant');
            } catch (error) {
                console.error('Error:', error);
                showError('Unable to get response. Please try again.');
            }
        }

        function quickSearch(topic) {
            messageInput.value = `Tell me about ${topic}`;
            messageInput.focus();
            setTimeout(() => sendMessage(), 100);
        }

        function displayHealthResult(data) {
            let html = '';

            // Hero Card - Remedy
            html += `
                <div class="hero-card">
                    <div class="card-label">💊 Remedy</div>
                    <div class="card-title">${data.topic || 'Health Tip'}</div>
                    <div class="card-description">${data.advice || 'No advice available.'}</div>
                </div>
            `;

            // Info Cards
            if (data.recommendations && Array.isArray(data.recommendations)) {
                data.recommendations.slice(0, 4).forEach((rec, index) => {
                    let emoji = '✅';
                    let cardClass = 'info-card';
                    let label = 'Step';

                    if (rec.type === 'warning') {
                        emoji = '⚠️';
                        cardClass = 'info-card warning';
                        label = 'Warning';
                    } else if (rec.type === 'doctor') {
                        emoji = '👨‍⚕️';
                        cardClass = 'info-card doctor';
                        label = 'Doctor Recommendation';
                    } else if (rec.type === 'why') {
                        emoji = '🧠';
                        label = 'Why it Helps';
                    }

                    html += `
                        <div class="${cardClass}">
                            <div class="card-label">${emoji} ${label}</div>
                            <div class="card-title">${rec.title || 'Information'}</div>
                            <div class="card-description">${rec.content || rec.description || ''}</div>
                        </div>
                    `;
                });
            }

            resultPanel.innerHTML = html;
            resultPanel.classList.remove('empty');
            quickButtons.classList.add('hidden');
        }

        function updateChatSummary(text, sender) {
            const prefix = sender === 'user' ? 'You: ' : 'Assistant: ';
            chatSummary.textContent = prefix + text.substring(0, 60) + (text.length > 60 ? '...' : '');
        }

        function showLoading() {
            resultPanel.innerHTML = '<div class="loading-skeleton"></div>';
            resultPanel.classList.remove('empty');
            quickButtons.classList.add('hidden');
        }

        function showError(message) {
            resultPanel.innerHTML = `<div class="error-message">❌ ${message}</div>`;
            resultPanel.classList.remove('empty');
            quickButtons.classList.add('hidden');
        }

        function resetUI() {
            resultPanel.innerHTML = '<div>Select a quick question or type your own to get started</div>';
            resultPanel.classList.add('empty');
            quickButtons.classList.remove('hidden');
        }
    </script>
</body>
</html>
